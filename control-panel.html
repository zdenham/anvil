<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Control Panel</title>
    <style>
      html,
      body,
      #root {
        margin: 0;
        padding: 0;
        /* Transparent background for rounded corners on macOS NSPanel */
        background: transparent;
        overflow: hidden;
        height: 100%;
        width: 100%;
      }
      #root {
        box-sizing: border-box;
        display: flex;
        flex-direction: column;
        align-items: stretch;
      }
      /* Standalone window dark background - applied immediately to prevent white flash */
      html.standalone-window,
      html.standalone-window body,
      html.standalone-window #root {
        background: rgba(30, 32, 30, 1) !important;
      }
    </style>
    <script>
      // Detect standalone window from URL params and apply class immediately
      // This prevents white flash before React mounts
      if (new URLSearchParams(window.location.search).has('instanceId')) {
        document.documentElement.classList.add('standalone-window');
      }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/control-panel-main.tsx"></script>
  </body>
</html>
